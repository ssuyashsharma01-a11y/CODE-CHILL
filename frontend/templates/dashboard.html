<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Dashboard | TrustMark AI v25 Platinum</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .neon { 
            color: #00f9ff; 
            text-shadow: 0 0 15px rgba(0, 249, 255, 0.5); 
        }
        
        /* Roster clickable styling */
        .roster-card {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .roster-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 249, 255, 0.3);
            border-left-color: #00d4ff !important;
        }
        
        .status-badge { padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-secure { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-dl { background: rgba(234, 179, 8, 0.1); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        
        /* PULSE ANIMATION FOR URGENT BROADCASTS */
        @keyframes glow-pulse {
            0%, 100% { border-left: 4px solid #f87171; opacity: 0.8; }
            50% { border-left: 4px solid #ff6b6b; opacity: 1; }
        }
        
        .broadcast-urgent { animation: glow-pulse 1.5s infinite; }
        
        /* Modal Styles */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        
        .modal-backdrop.active { display: flex; }
        
        .modal-content {
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.98), rgba(15, 15, 35, 0.98));
            backdrop-filter: blur(20px); border: 1px solid rgba(0, 249, 255, 0.3);
            border-radius: 20px; padding: 2.5rem; max-width: 600px; width: 90%; max-height: 85vh;
            overflow-y: auto; border-left: 5px solid #00f9ff;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .grid { display: grid; gap: 1.5rem; }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .flex { display: flex; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass flex justify-between mb-6" style="border-left: 4px solid #00f9ff;">
            <div>
                <h1 class="neon" style="font-size: 2.25rem; font-weight: 900;">🔐 TrustMark Sovereign</h1>
                <p style="color: #9ca3af; font-size: 0.875rem;">Identity Governance Matrix | v25 Platinum</p>
            </div>
            <div style="text-align: right;">
                <button onclick="logout()" style="color: #f87171; background: none; border: none; font-weight: bold; cursor: pointer;">
                    <i class="fas fa-power-off"></i> TERMINATE_SESSION
                </button>
                <p style="color: #6b7280; font-size: 10px; margin-top: 8px;">Lead Dev: Suyash Sharma</p>
            </div>
        </div>

        <div id="broadcast-alert" class="glass p-4 mb-6 broadcast-urgent hidden">
            <div class="flex justify-between">
                <div class="flex" style="gap: 15px;">
                    <i class="fas fa-bullhorn neon"></i>
                    <h4 id="notice-text" style="color: #fff; font-weight: 900;"></h4>
                </div>
                <button onclick="this.parentElement.parentElement.classList.add('hidden')" style="color:#6b7280; background:none; border:none; cursor:pointer;">✕</button>
            </div>
        </div>

        <div class="grid grid-4 mb-6">
            <div class="glass p-6 stat-card">
                <p style="font-size: 11px; color: #9ca3af;">Identities Enrolled</p>
                <h3 id="stat-users" class="neon" style="font-size: 2.25rem;">--</h3>
            </div>
            <div class="glass p-6 stat-card">
                <p style="font-size: 11px; color: #9ca3af;">Verification Logs</p>
                <h3 id="stat-attendance" style="font-size: 2.25rem; color: #4ade80;">--</h3>
            </div>
            <div class="glass p-6 stat-card">
                <p style="font-size: 11px; color: #9ca3af;">Broadcast Nodes</p>
                <h3 id="stat-notices" style="font-size: 2.25rem; color: #a78bfa;">--</h3>
            </div>
            <div class="glass p-6 stat-card">
                <p style="font-size: 11px; color: #9ca3af;">Anti-Spoof Alerts</p>
                <h3 id="stat-alerts" style="font-size: 2.25rem; color: #f87171;">0</h3>
            </div>
        </div>

        <div class="glass p-6 mb-6">
            <h2 class="neon mb-6"><i class="fas fa-users"></i> Neural Identity Roster</h2>
            <div id="students-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;"></div>
        </div>
    </div>

    <div id="student-modal" class="modal-backdrop">
        <div class="modal-content">
            <div class="flex justify-between mb-6" style="border-bottom: 1px solid rgba(0,249,255,0.2); padding-bottom: 1rem;">
                <div>
                    <h2 id="modal-name" class="neon" style="font-size: 1.8rem;">Student Name</h2>
                    <p id="modal-uid" style="font-family: monospace; font-size: 12px; color: #9ca3af;"></p>
                </div>
                <button onclick="closeStudentModal()" style="color: #6b7280; background:none; border:none; font-size: 1.5rem; cursor:pointer;">✕</button>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div style="background: rgba(74,222,128,0.1); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(74,222,128,0.2);">
                    <p style="font-size: 10px; color: #9ca3af;">ATTENDANCE</p>
                    <h3 id="modal-attendance" style="color: #4ade80; font-size: 2rem;">--</h3>
                </div>
                <div style="background: rgba(0,249,255,0.1); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(0,249,255,0.2);">
                    <p style="font-size: 10px; color: #9ca3af;">LOGS</p>
                    <h3 id="modal-records" style="color: #00f9ff; font-size: 2rem;">--</h3>
                </div>
            </div>

            <div id="modal-dl-status" class="glass mb-6" style="border-left: 4px solid #facc15;">
                <p style="color: #facc15; font-weight: 700;">No Active Duty Leave</p>
            </div>

            <h3 class="neon" style="font-size: 12px; margin-bottom: 1rem;">SUBJECT BREAKDOWN</h3>
            <div id="modal-subjects" style="display: flex; flex-direction: column; gap: 1rem;"></div>
        </div>
    </div>

    <script>
        async function syncMatrix() {
            try {
                const res = await fetch('/api/v1/admin/analytics');
                if (res.status === 401) { window.location.href = "/api/v1/auth/login-page"; return; }
                
                const data = await res.json();
                document.getElementById('stat-users').innerText = data.users || "0";
                document.getElementById('stat-attendance').innerText = data.today_records || "0";
                document.getElementById('stat-notices').innerText = data.notices || "0";

                // Sync Students Roster
                const studentsRes = await fetch('/api/v1/admin/students');
                if (studentsRes.ok) {
                    const students = await studentsRes.json();
                    const container = document.getElementById('students-container');
                    container.innerHTML = students.map(s => `
                        <div class="glass roster-card" onclick='showStudentModal(${JSON.stringify(s)})'>
                            <h3 class="neon">${s.name}</h3>
                            <p style="font-size: 12px; color: #9ca3af;">UID: ${s.uid}</p>
                            <h2 style="text-align: right; margin-top: 10px;">${(s.overall_attendance || 0).toFixed(1)}%</h2>
                        </div>
                    `).join('');
                }

                // Sync Broadcasts
                const noticeRes = await fetch('/api/v1/admin/broadcast/notices?unread_only=true');
                const notices = await noticeRes.json();
                if (notices.length > 0) {
                    document.getElementById('broadcast-alert').classList.remove('hidden');
                    document.getElementById('notice-text').innerText = notices[0].content;
                }
            } catch (err) { console.error("Sync Failure:", err); }
        }

        function showStudentModal(student) {
            document.getElementById('modal-name').innerText = student.name;
            document.getElementById('modal-uid').innerText = `UID: ${student.uid}`;
            document.getElementById('modal-attendance').innerText = `${(student.overall_attendance || 0).toFixed(1)}%`;
            document.getElementById('modal-records').innerText = student.total_records || "0";
            
            const subDiv = document.getElementById('modal-subjects');
            subDiv.innerHTML = student.subject_attendance ? Object.entries(student.subject_attendance).map(([sub, d]) => `
                <div class="glass flex justify-between" style="padding: 10px;">
                    <span>${sub}</span>
                    <span class="neon">${d.attendance_percent}%</span>
                </div>
            `).join('') : 'No data';

            document.getElementById('student-modal').classList.add('active');
        }

        function closeStudentModal() { document.getElementById('student-modal').classList.remove('active'); }
        function logout() { window.location.href = "/api/v1/auth/logout"; }

        window.onload = () => { syncMatrix(); setInterval(syncMatrix, 15000); };
    </script>
</body>
</html>
