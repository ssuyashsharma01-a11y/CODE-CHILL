upstream trustmark_backend {
    # 🎯 FIX: Match this with your container name in docker-compose.yml
    server trustmark_sovereign_v50:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # 🛡️ Sovereign Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 📁 Static Assets Node
    location /static/ {
        proxy_pass http://trustmark_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 🧠 API REST Interface
    location /api/ {
        proxy_pass http://trustmark_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout handling for heavy AI processing
        proxy_connect_timeout 90s;
        proxy_read_timeout 90s;
    }

    # 📡 Biometric WebSocket Pipeline (Real-time Frame Stream)
    location /api/v1/attendance/ws {
        proxy_pass http://trustmark_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # WebSocket Persistence
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 🚦 Root Gateway (HTML Handshake)
    location / {
        proxy_pass http://trustmark_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}